<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChromeBlocker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        width: 280px;
        padding: 12px;
      }
      .title {
        font-weight: 700;
        margin-bottom: 8px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: transparent;
        cursor: pointer;
      }
      .hint {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <div class="title">ChromeBlocker</div>
    <div class="row">
      <button id="openOptions">Open settings</button>
    </div>
    <div class="hint">Edit sites and schedules in settings.</div>
    <script src="./popup.js"></script>
  </body>
</html>
